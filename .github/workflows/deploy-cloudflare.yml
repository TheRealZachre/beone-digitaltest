name: Deploy to Cloudflare Workers (OpenNext)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy with OpenNext
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deploy pipeline
        run: echo "Using npm run ci:cloudflare (no wrangler-action)"

      - name: Build and deploy to Cloudflare
        run: npm run ci:cloudflare
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUTH_EMAIL_FROM: ${{ secrets.AUTH_EMAIL_FROM }}
